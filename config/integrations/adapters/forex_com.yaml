enabled: false
base_url: https://api-demo.forex.com
auth_endpoint: /session
positions_endpoint: /positions
balances_endpoint: /accounts
orders_endpoint: /orders
fills_endpoint: /fills
api_key_env: FOREXCOM_API_KEY
username_env: FOREXCOM_USERNAME
password_env: FOREXCOM_PASSWORD
bearer_token_env: FOREXCOM_BEARER_TOKEN
timeout_seconds: 20
dry_run: true

capabilities:
  paper: true
  live: true
  submit_order: true
  cancel_order: true
  close_position: true
  close_all_positions: true
